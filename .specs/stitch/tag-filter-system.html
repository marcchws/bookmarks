<div class="w-full max-w-3xl mx-auto space-y-bento-gap">

<div class="w-full relative border border-outline-variant bg-surface-container-lowest p-1 flex items-center group hover:border-primary-container transition-colors">
<span class="material-symbols-outlined text-outline ml-2">search</span>
<input class="w-full bg-transparent border-none text-on-background font-body-mono text-body-mono focus:ring-0 placeholder:text-outline-variant uppercase tracking-widest pl-3 h-10 outline-none" placeholder="QUERY SYSTEM..." type="text"/>
<span class="w-2 h-5 bg-primary-container animate-pulse mr-3"></span>
</div>
<!-- Horizontal Tag Filter Bar -->
<div class="relative w-full overflow-hidden bg-black py-2 border-b border-surface-container-high/50">
<!-- Right Gradient Mask for scroll indication -->
<div class="absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l from-black to-transparent pointer-events-none z-10"></div>
<!-- Scrollable Container -->
<div class="flex flex-row gap-3 overflow-x-auto no-scrollbar w-full whitespace-nowrap pl-1 pr-16 items-center">
<!-- Selected Chip (ALL) -->
<button class="flex-none px-4 py-1.5 bg-primary-container text-on-primary-container font-h2 text-[11px] tracking-widest uppercase border border-primary-container cyber-glow-active transition-all active:translate-x-[2px]">
                        ALL
                    </button>
<!-- Unselected Chips -->
<button class="flex-none px-4 py-1.5 bg-transparent text-outline-variant font-h2 text-[11px] tracking-widest uppercase border border-outline-variant hover:border-primary-container hover:text-primary-container hover:cyber-glow-active transition-all active:translate-x-[2px]">
                        NETWORK
                    </button>
<button class="flex-none px-4 py-1.5 bg-transparent text-outline-variant font-h2 text-[11px] tracking-widest uppercase border border-outline-variant hover:border-primary-container hover:text-primary-container hover:cyber-glow-active transition-all active:translate-x-[2px]">

<button class="flex-none px-4 py-1.5 bg-transparent text-outline-variant font-h2 text-[11px] tracking-widest uppercase border border-outline-variant hover:border-primary-container hover:text-primary-container hover:cyber-glow-active transition-all active:translate-x-[2px]">

                        ARCHIVE
                    </button>
<button class="flex-none px-4 py-1.5 bg-transparent text-outline-variant font-h2 text-[11px] tracking-widest uppercase border border-outline-variant hover:border-primary-container hover:text-primary-container hover:cyber-glow-active transition-all active:translate-x-[2px]">
